<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poke Fitness: Cloud Sync</title>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        :root { --pika-yellow: #ffcc00; --bg: #000; --rest-blue: #74b9ff; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; touch-action: manipulation; }
        #watch-face { width: 98vw; height: 98vw; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        #brand-tag { font-size: 10px; color: var(--pika-yellow); text-transform: uppercase; font-weight: bold; pointer-events: none; }
        #food-bank { font-size: 11px; color: #ff7675; border: 1px solid #ff7675; padding: 1px 10px; border-radius: 12px; margin: 2px 0; }
        #top-stats { font-size: 11px; font-weight: bold; margin-bottom: 2px; }
        #mood-text { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }

        #pet-display { height: 24%; position: relative; display: flex; align-items: center; justify-content: center; }
        #pet-img { max-height: 100%; image-rendering: pixelated; }
        
        /* Zzz Animations */
        #zzz-container { position: absolute; top: -5px; right: -15px; display: none; pointer-events: none; }
        .zzz { color: var(--rest-blue); font-size: 14px; position: absolute; animation: z-float 2s infinite; opacity: 0; font-weight: bold; }
        .z2 { animation-delay: 0.6s; }
        .z3 { animation-delay: 1.2s; }
        @keyframes z-float { 0% { transform: translate(0,0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(10px, -15px) scale(1.2); opacity: 0; } }

        .stats-container { width: 75%; display: flex; flex-direction: column; gap: 4px; }
        .bar-bg { width: 100%; height: 6px; background: #111; border-radius: 4px; border: 1px solid #333; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.5s ease; }

        .controls { position: relative; z-index: 100; display: grid; grid-template-columns: 1fr 1fr; width: 85%; gap: 8px; margin-top: 10px; }
        button { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px 0; border-radius: 20px; font-size: 10px; text-transform: uppercase; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        button:active { background: var(--pika-yellow) !important; color: #000 !important; }
        #sync-btn { grid-column: span 2; background: #0c330c; color: #0f0; border-color: #0f0; }
        
        #log-screen { position: absolute; bottom: 5%; font-size: 7px; color: #ff4757; width: 80%; text-align: center; pointer-events: none; line-height: 1.2; }
    </style>
</head>
<body>

<div id="watch-face">
    <div id="brand-tag">Poke Fitness</div>
    <div id="food-bank">🍎 x<span id="bank-count">0</span></div>
    <div id="top-stats">👟 <span id="cur-steps">0</span> / <span id="goal-display">1000</span></div>
    <div id="mood-text">READY</div>

    <div id="pet-display">
        <div id="zzz-container">
            <span class="zzz z1">z</span><span class="zzz z2">z</span><span class="zzz z3">z</span>
        </div>
        <img id="pet-img" src="moderatehappiness.png">
    </div>

    <div class="stats-container">
        <div class="bar-bg"><div id="h-bar" class="bar-fill" style="background:#00ff00"></div></div>
        <div class="bar-bg"><div id="f-bar" class="bar-fill" style="background:#ffa502"></div></div>
    </div>

    <div class="controls">
        <button id="feed-btn">Eat</button>
        <button id="sleep-btn">Rest</button>
        <button id="sync-btn">Sync Official Steps</button>
    </div>
    <div id="log-screen"></div>
</div>

<script>
    const CLIENT_ID = '191837762219-50h7a583d6eluh9scu6d3geek44n7vp1.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/fitness.activity.read';

    let pet = JSON.parse(localStorage.getItem('poke_fit_v14')) || {
        steps: 0, goal: 1000, f: 80, foodBank: 0, isSleeping: false
    };

    let tokenClient;
    let accessToken = null;

    function log(msg) { document.getElementById('log-screen').innerText = msg; }

    window.onload = () => {
        try {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (res) => {
                    if (res.access_token) {
                        accessToken = res.access_token;
                        fetchOfficialSteps();
                    }
                },
            });
            log("API Ready.");
        } catch (e) { log("Google Script Load Error."); }
        updateUI();
    };

    async function fetchOfficialSteps() {
        log("Connecting to Health Cloud...");
        const midnight = new Date().setHours(0,0,0,0);
        
        // This query asks for ALL step sources today
        const body = {
            "aggregateBy": [{"dataTypeName": "com.google.step_count.delta"}],
            "bucketByTime": { "durationMillis": 86400000 },
            "startTimeMillis": midnight,
            "endTimeMillis": Date.now()
        };

        try {
            const res = await fetch('https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            
            // Search every possible bucket Google returns
            let totalSteps = 0;
            if (data.bucket && data.bucket[0].dataset[0].point) {
                data.bucket[0].dataset[0].point.forEach(p => {
                    totalSteps += p.value[0].intVal || 0;
                });
            }

            pet.steps = totalSteps;
            pet.foodBank = Math.floor(totalSteps / 1000);
            updateUI();
            
            if (totalSteps > 0) log("Success: " + totalSteps + " steps!");
            else log("Connected! But 0 steps found in Cloud.");
            
        } catch (e) { log("Fetch Failed. Ensure Fitness API is Enabled."); }
    }

    function updateUI() {
        document.getElementById('cur-steps').innerText = pet.steps;
        document.getElementById('bank-count').innerText = pet.foodBank;
        const hPercent = Math.min(100, (pet.steps / pet.goal) * 100);
        document.getElementById('h-bar').style.width = hPercent + '%';
        document.getElementById('f-bar').style.width = pet.f + '%';

        const img = document.getElementById('pet-img');
        const moodDiv = document.getElementById('mood-text');
        const zzz = document.getElementById('zzz-container');

        if (pet.isSleeping) {
            img.src = 'sleep.png';
            moodDiv.innerText = "STATUS: RESTING";
            zzz.style.display = "block";
            document.body.style.opacity = "0.6";
        } else {
            zzz.style.display = "none";
            document.body.style.opacity = "1";
            if (hPercent >= 100) { img.src = 'adoration.png'; moodDiv.innerText = "STATUS: CHAMPION"; }
            else if (pet.f < 20) { img.src = 'annoyed.png'; moodDiv.innerText = "STATUS: STARVING"; }
            else if (hPercent < 20) { img.src = 'pain.png'; moodDiv.innerText = "STATUS: SLUGGISH"; }
            else { img.src = 'moderatehappiness.png'; moodDiv.innerText = "STATUS: HEALTHY"; }
        }
        localStorage.setItem('poke_fit_v14', JSON.stringify(pet));
    }

    document.getElementById('sync-btn').onclick = () => {
        tokenClient.requestAccessToken({prompt: 'consent'});
    };

    document.getElementById('feed-btn').onclick = () => {
        if (!pet.isSleeping && pet.foodBank > 0) {
            pet.foodBank--; pet.f = Math.min(100, pet.f + 25); updateUI();
        }
    };

    document.getElementById('sleep-btn').onclick = () => {
        pet.isSleeping = !pet.isSleeping; updateUI();
    };

    updateUI();
</script>
</body>
</html>
