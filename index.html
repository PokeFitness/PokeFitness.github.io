<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poke Fitness</title>
    <style>
        :root { --pika-yellow: #ffcc00; --frame-gold: #c6a04e; --btn-gold: #a6843c; }
        
        /* Force the background to cover the entire watch face */
        html, body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Courier New', Courier, monospace; background: #000; 
        }

        #watch-face { 
            width: 100vw; height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative; 
            /* Improved background sizing */
            background-image: url('./46225.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        #brand-tag { font-size: 11px; color: var(--pika-yellow); font-weight: bold; text-transform: uppercase; margin-bottom: 2px; text-shadow: 2px 2px 2px #000; }
        #top-stats { font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #fff; text-shadow: 2px 2px 2px #000; }
        
        #pet-display { 
            height: 30%; margin-bottom: 8px; display: flex; 
            align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.4); border: 3px solid var(--frame-gold); 
            padding: 4px; border-radius: 4px;
        }
        #pet-img { height: 100%; image-rendering: pixelated; }

        .bar-container { width: 75%; margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.6); border-radius: 5px; border: 1px solid #333; overflow: hidden; margin-bottom: 4px; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.8s ease; }

        .controls { display: flex; justify-content: space-around; width: 95%; align-items: center; margin-top: 5px; }
        
        .circle-btn { 
            background: var(--btn-gold); border: 2px solid #fff; color: #fff; 
            width: 50px; height: 50px; border-radius: 50%; font-size: 10px; 
            font-weight: bold; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px #000; -webkit-tap-highlight-color: transparent; 
        }

        #sync-btn { 
            background: #115511; border: 3px solid #0f0; color: #fff; 
            width: 75px; height: 75px; border-radius: 50%; font-size: 12px; 
            font-weight: bold; text-align: center; line-height: 1.1; 
            box-shadow: 0 4px #000;
        }
        
        #log-screen { font-size: 10px; color: var(--pika-yellow); margin-top: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>
    <div id="watch-face">
        <div id="brand-tag">Poke Fitness</div>
        <div id="top-stats">👟 <span id="cur-steps">0</span> | 🍎 <span id="apple-count">0</span></div>
        
        <div id="pet-display">
            <img id="pet-img" src="moderatehappiness.png">
        </div>

        <div class="bar-container">
            <div class="bar-bg"><div id="h-bar" class="bar-fill" style="background:#0f0"></div></div>
            <div class="bar-bg"><div id="f-bar" class="bar-fill" style="background:#ffa502"></div></div>
        </div>

        <div class="controls">
            <button class="circle-btn" onclick="feed()">Eat</button>
            <button id="sync-btn" onclick="startSync()">Sync<br>Steps</button>
            <button class="circle-btn" onclick="log('Resting...')">Rest</button>
        </div>
        <div id="log-screen">Ready</div>
    </div>

<script>
    const CLIENT_ID = '191837762219-50h7a583d6eluh9scu6d3geek44n7vp1.apps.googleusercontent.com';
    const REDIRECT_URI = 'https://pokefitness.github.io/';
    
    // Hard reset of the data structure to prevent UI revert
    let pet = JSON.parse(localStorage.getItem('poke_v26_final')) || { 
        steps: 0, apples: 0, hunger: 80, energy: 50, token: null 
    };

    function log(msg) { document.getElementById('log-screen').innerText = msg; }

    window.onload = () => {
        const params = new URLSearchParams(window.location.hash.substring(1));
        const newToken = params.get('access_token');

        if (newToken) {
            pet.token = newToken;
            saveData();
            window.history.replaceState(null, null, window.location.pathname);
            fetchSteps(newToken);
        } else if (pet.token) {
            fetchSteps(pet.token);
        }
        updateUI();
    };

    function startSync() {
        log("Redirecting...");
        window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=https://www.googleapis.com/auth/fitness.activity.read&prompt=select_account`;
    }

    async function fetchSteps(token) {
        const midnight = new Date().setHours(0,0,0,0);
        try {
            const res = await fetch('https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "aggregateBy": [{"dataTypeName": "com.google.step_count.delta"}],
                    "bucketByTime": { "durationMillis": 86400000 },
                    "startTimeMillis": midnight, "endTimeMillis": Date.now()
                })
            });
            
            if (res.status === 401) {
                log("Tap Sync.");
                return;
            }

            const data = await res.json();
            const steps = data.bucket[0].dataset[0].point[0]?.value[0]?.intVal || 0;
            
            pet.steps = steps;
            pet.apples = Math.floor(steps / 500);
            pet.energy = Math.min(100, (steps / 1000) * 100);
            
            updateUI();
            log("Sync Success!");
        } catch (e) { log("Data Error."); }
    }

    function saveData() { localStorage.setItem('poke_v26_final', JSON.stringify(pet)); }

    function updateUI() {
        document.getElementById('cur-steps').innerText = pet.steps;
        document.getElementById('apple-count').innerText = pet.apples;
        document.getElementById('h-bar').style.width = pet.energy + '%';
        document.getElementById('f-bar').style.width = pet.hunger + '%';
        saveData();
    }

    function feed() { 
        if (pet.apples > 0) {
            pet.apples--;
            pet.hunger = Math.min(100, pet.hunger + 20);
            log("-1 Apple");
            updateUI();
        } else {
            log("Need 500 steps!");
        }
    }
</script>
</body>
</html>
