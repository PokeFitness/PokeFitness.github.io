<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poke Fitness</title>
    <style>
        :root { --pika-yellow: #ffcc00; --bg: #000; --rest-blue: #74b9ff; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
        
        #watch-face { width: 98vw; height: 98vw; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; position: relative; }
        
        #brand-tag { font-size: 10px; color: var(--pika-yellow); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; pointer-events: none; font-weight: bold; }
        
        /* Debug now only visible if we specifically want it */
        #debug { font-size: 8px; color: #222; position: absolute; top: 12%; pointer-events: none; display: none; }
        
        #food-bank { font-size: 11px; color: #ff7675; border: 1px solid #ff7675; padding: 1px 10px; border-radius: 12px; pointer-events: none; margin-bottom: 2px; }
        #top-stats { font-size: 11px; color: #fff; font-weight: bold; pointer-events: none; margin: 2px 0; }
        
        #mood-text { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; pointer-events: none; }

        #pet-display { height: 24%; position: relative; pointer-events: none; display: flex; align-items: center; justify-content: center; }
        #pet-img { max-height: 100%; image-rendering: pixelated; }
        
        #zzz-container { position: absolute; top: -5px; right: -15px; display: none; }
        .zzz { color: var(--rest-blue); font-size: 14px; position: absolute; animation: z-float 2s infinite; opacity: 0; font-weight: bold; }
        .z2 { animation-delay: 0.6s; }
        .z3 { animation-delay: 1.2s; }

        @keyframes z-float {
            0% { transform: translate(0,0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(10px, -15px) scale(1.2); opacity: 0; }
        }

        .stats-container { width: 75%; display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
        .bar-wrapper { display: flex; align-items: center; gap: 6px; font-size: 8px; font-weight: bold; }
        .bar-bg { flex-grow: 1; height: 6px; background: #111; border-radius: 4px; border: 1px solid #333; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.2s linear; }

        .controls { position: relative; z-index: 100; display: grid; grid-template-columns: 1fr 1fr; width: 85%; gap: 8px; margin-top: 10px; }
        button { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px 0; border-radius: 20px; font-size: 10px; text-transform: uppercase; cursor: pointer; font-weight: bold; }
        button:active { background: var(--pika-yellow); color: #000; }
        .sensor-btn { grid-column: span 2; background: #0c330c; border-color: #00ff00; }
    </style>
</head>
<body>

<div id="watch-face">
    <div id="brand-tag">Poke Fitness</div>
    <div id="debug">Force: 0.0</div>
    
    <div id="food-bank">🍎 x<span id="bank-count">0</span></div>
    <div id="top-stats">👟 <span id="cur-steps">0</span> / 🎯 <span id="goal-display">--</span></div>
    
    <div id="mood-text">STATUS: NORMAL</div>

    <div id="pet-display">
        <div id="zzz-container">
            <span class="zzz z1">z</span>
            <span class="zzz z2">z</span>
            <span class="zzz z3">z</span>
        </div>
        <img id="pet-img" src="moderatehappiness.png">
    </div>

    <div class="stats-container">
        <div class="bar-wrapper">FIT <div class="bar-bg"><div id="h-bar" class="bar-fill" style="background:#00ff00"></div></div></div>
        <div class="bar-wrapper">FD  <div class="bar-bg"><div id="f-bar" class="bar-fill" style="background:#ffa502"></div></div></div>
        <div class="bar-wrapper">ZZ  <div class="bar-bg"><div id="z-bar" class="bar-fill" style="background:var(--rest-blue)"></div></div></div>
    </div>

    <div class="controls">
        <button id="feed-btn" onclick="actFeed()">Eat</button>
        <button id="sleep-btn" onclick="toggleSleep()">Rest</button>
        <button id="setup-btn" class="sensor-btn" onclick="initGoalMode()">Set Goal & Start</button>
    </div>
</div>

<script>
    let pet = JSON.parse(localStorage.getItem('poke_fit_v8')) || {
        h: 0, f: 80, z: 80, steps: 0, goal: 1000, foodBank: 0, isSleeping: false
    };

    let lastStepTime = 0;
    const isMobile = /Android|iPhone/i.test(navigator.userAgent) && !/Wear/i.test(navigator.userAgent);
    const THRESHOLD = isMobile ? 18.0 : 5.0;
