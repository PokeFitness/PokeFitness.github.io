<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poke Fitness Fix</title>
    <style>
        :root { --pika-yellow: #ffcc00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; touch-action: manipulation; }
        #watch-face { width: 98vw; height: 98vw; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        #brand-tag { font-size: 10px; color: var(--pika-yellow); text-transform: uppercase; margin-bottom: 2px; font-weight: bold; }
        #top-stats { font-size: 11px; font-weight: bold; margin: 2px 0; }
        #mood-text { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 4px; }

        #pet-display { height: 24%; display: flex; align-items: center; justify-content: center; }
        #pet-img { max-height: 100%; image-rendering: pixelated; }

        .stats-container { width: 75%; display: flex; flex-direction: column; gap: 4px; }
        .bar-wrapper { display: flex; align-items: center; gap: 6px; font-size: 8px; font-weight: bold; }
        .bar-bg { flex-grow: 1; height: 6px; background: #111; border-radius: 4px; border: 1px solid #333; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.2s linear; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; width: 85%; gap: 8px; margin-top: 10px; }
        button { background: #222; border: 1px solid #444; color: white; padding: 12px 0; border-radius: 20px; font-size: 10px; text-transform: uppercase; font-weight: bold; -webkit-appearance: none; }
        button:active { background: var(--pika-yellow) !important; color: #000 !important; }
        .sensor-btn { grid-column: span 2; background: #0c330c; border-color: #00ff00; }
        
        /* ERROR LOGGER (Invisible unless error occurs) */
        #logger { position: absolute; bottom: 5%; font-size: 7px; color: red; width: 80%; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

<div id="watch-face">
    <div id="brand-tag">Poke Fitness</div>
    <div id="top-stats">👟 <span id="cur-steps">0</span> / <span id="goal-display">1000</span></div>
    <div id="mood-text">STATUS: INITIALIZING</div>

    <div id="pet-display"><img id="pet-img" src="moderatehappiness.png"></div>

    <div class="stats-container">
        <div class="bar-wrapper">FIT <div class="bar-bg"><div id="h-bar" class="bar-fill" style="background:#00ff00"></div></div></div>
        <div class="bar-wrapper">FD  <div class="bar-bg"><div id="f-bar" class="bar-fill" style="background:#ffa502"></div></div></div>
        <div class="bar-wrapper">ZZ  <div class="bar-bg"><div id="z-bar" class="bar-fill" style="background:#74b9ff"></div></div></div>
    </div>

    <div class="controls">
        <button id="feed-btn">Eat</button>
        <button id="sleep-btn">Rest</button>
        <button id="setup-btn" class="sensor-btn">START SENSORS</button>
    </div>
    <div id="logger"></div>
</div>

<script>
    // Log errors to the watch screen for debugging
    window.onerror = function(msg) { document.getElementById('logger').innerText = msg; };

    let pet = JSON.parse(localStorage.getItem('poke_fit_v9')) || {
        h: 0, f: 80, z: 80, steps: 0, goal: 1000, foodBank: 0, isSleeping: false
    };

    let lastStepTime = 0;
    const isMobile = /Android|iPhone/i.test(navigator.userAgent) && !/Wear/i.test(navigator.userAgent);
    const THRESHOLD = isMobile ? 18.0 : 5.0; 

    function updateUI() {
        try {
            document.getElementById('h-bar').style.width = pet.h + '%';
            document.getElementById('f-bar').style.width = pet.f + '%';
            document.getElementById('z-bar').style.width = pet.z + '%';
            document.getElementById('cur-steps').innerText = pet.steps;
            document.getElementById('goal-display').innerText = pet.goal;
            document.getElementById('bank-count') ? document.getElementById('bank-count').innerText = pet.foodBank : null;

            const img = document.getElementById('pet-img');
            const moodDiv = document.getElementById('mood-text');
            const sleepBtn = document.getElementById('sleep-btn');

            if (pet.isSleeping) {
                img.src = 'sleep.png';
                moodDiv.innerText = "STATUS: RESTING";
                sleepBtn.innerText = "Wake";
            } else {
                sleepBtn.innerText = "Rest";
                if (pet.h >= 100) { img.src = 'adoration.png'; moodDiv.innerText = "STATUS: CHAMPION"; }
                else if (pet.f < 20) { img.src = 'annoyed.png'; moodDiv.innerText = "STATUS: STARVING"; }
                else if (pet.h < 20) { img.src = 'pain.png'; moodDiv.innerText = "STATUS: SLUGGISH"; }
                else { img.src = 'moderatehappiness.png'; moodDiv.innerText = "STATUS: HEALTHY"; }
            }
            localStorage.setItem('poke_fit_v9', JSON.stringify(pet));
        } catch(e) { document.getElementById('logger').innerText = e.message; }
    }

    // Attach listeners via JavaScript instead of onclick (more reliable)
    document.getElementById('feed-btn').addEventListener('click', () => {
        if (!pet.isSleeping && pet.foodBank > 0) {
            pet.foodBank--;
            pet.f = Math.min(100, pet.f + 25);
            updateUI();
        }
    });

    document.getElementById('sleep-btn').addEventListener('click', () => {
        pet.isSleeping = !pet.isSleeping;
        updateUI();
    });

    document.getElementById('setup-btn').addEventListener('click', function() {
        // Remove requirement for prompt which can block script execution
        this.style.display = 'none';
        startSensors();
        updateUI();
    });

    function startSensors() {
        window.addEventListener('devicemotion', (event) => {
            let acc = event.acceleration || event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;
            let magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            let now = Date.now();

            if (magnitude > THRESHOLD && (now - lastStepTime) > 400) {
                lastStepTime = now;
                if (pet.isSleeping) pet.isSleeping = false;
                pet.steps++;
                pet.h = Math.min(100, (pet.steps / pet.goal) * 100);
                if (pet.steps % 100 === 0) pet.foodBank++;
                updateUI();
            }
        }, true);
    }

    setInterval(() => {
        if (!pet.isSleeping) {
            pet.f = Math.max(0, pet.f - 0.2);
            pet.z = Math.max(0, pet.z - 0.1);
        } else {
            pet.z = Math.min(100, pet.z + 0.5);
        }
        updateUI();
    }, 10000);

    updateUI();
</script>
</body>
</html>
